<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Djo Bolachas</title>

<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:#f8f5f2;
}

header{
  background:#8B4513;
  color:white;
  padding:15px;
  text-align:center;
}

.produtos{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;
  padding:15px;
}

.produto{
  background:white;
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-size:14px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  transition:0.2s;
}

.produto:hover{
  transform:translateY(-3px);
}

/* 🔥 IMAGEM PROFISSIONAL QUADRADA */
.produto img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

.preco{
  color:#8B4513;
  font-weight:bold;
  margin-top:5px;
}

.controle-produto{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  margin-top:6px;
}

.controle-produto button{
  width:28px;
  height:28px;
  border:none;
  border-radius:6px;
  background:#8B4513;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.carrinho-flutuante{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#8B4513;
  color:white;
  border:none;
  width:65px;
  height:65px;
  border-radius:50%;
  font-size:24px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  cursor:pointer;
  z-index:1000;
}

.badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  font-size:13px;
  width:22px;
  height:22px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  right:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:flex-end;
}

.modal.ativo{
  display:flex;
}

.modal-conteudo{
  background:white;
  width:340px;
  height:80%;
  margin:auto 0;
  border-radius:18px 0 0 18px;
  padding:20px;
  display:flex;
  flex-direction:column;
}

#listaCarrinho{
  flex:1;
  overflow-y:auto;
  margin-top:10px;
}

.item-carrinho{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
  border-bottom:1px solid #eee;
  padding-bottom:8px;
}

.item-carrinho img{
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:8px;
}

.item-info{ flex:1; font-size:14px; }

.subtotal{
  font-weight:bold;
  color:#8B4513;
  font-size:14px;
}

.controle-quantidade{
  display:flex;
  gap:6px;
  margin-top:4px;
}

.controle-quantidade button{
  width:26px;
  height:26px;
  border:none;
  border-radius:6px;
  background:#8B4513;
  color:white;
  cursor:pointer;
}

.btn-remover{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
  margin-left:auto;
}

.btn-finalizar{
  background:green;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  font-size:15px;
}

.btn-voltar{
  background:none;
  border:none;
  color:#8B4513;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
  font-size:14px;
}

/* MODAL IMAGEM */
.modal-imagem{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.modal-imagem img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}
</style>
</head>
<body>

<header>
<h1>Djo Bolachas</h1>
</header>

<div class="produtos" id="listaProdutos"></div>

<button class="carrinho-flutuante" onclick="abrirCarrinho()">
🛒
<div class="badge" id="contadorItens">0</div>
</button>

<div id="modalCarrinho" class="modal">
<div class="modal-conteudo">
<h2>Seu Carrinho</h2>

<input type="text" id="nomeCliente"
placeholder="Digite seu nome"
style="padding:10px; margin:10px 0; border-radius:8px; border:1px solid #ddd;">

<div id="listaCarrinho"></div>

<h3 id="totalModal" class="preco">Total: R$0,00</h3>

<button class="btn-finalizar" onclick="enviarPedido()">
Finalizar no WhatsApp
</button>

<button class="btn-voltar" onclick="fecharCarrinho()">
Voltar
</button>
</div>
</div>

<div id="modalImagem" class="modal-imagem" onclick="fecharImagem()">
<img id="imagemGrande">
</div>

<script>
const telefone="5548992236978";

let produtos=[
  { nome: "Especial Páscoa", preco: 25, quantidade: 0, imagem: "pascoa.jpeg", destaque: true },
  { nome: "Pão", preco: 15, quantidade: 0, imagem: "logo minimalista par.png" },
  { nome: "Polvilho 200g", preco: 13, quantidade: 0, imagem: "logo minimalista par.png" },
  { nome: "Laranja 250g", preco: 13, quantidade: 0, imagem: "logo minimalista par.png" },
  { nome: "Cookies 250g", preco: 13, quantidade: 0, imagem: "cookies.jpeg", destaque: true },
  { nome: "Amendoim 250g", preco: 13, quantidade: 0, imagem: "amendoim.jpeg" },
  { nome: "Milho 200g", preco: 13, quantidade: 0, imagem: "logo minimalista par.png" },
  { nome: "Milho 400g", preco: 20, quantidade: 0, imagem: "logo minimalista par.png" },
  { nome: "Coco 400g", preco: 18, quantidade: 0, imagem: "logo minimalista par.png" },
  { nome: "Natal 250g", preco: 18, quantidade: 0, imagem: "logo minimalista par.png" },
  { nome: "Cristal 400g", preco: 18, quantidade: 0, imagem: "logo minimalista par.png" },
  { nome: "Goiaba 290g", preco: 18, quantidade: 0, imagem: "logo minimalista par.png" },
  { nome: "Manteiga 400g", preco: 18, quantidade: 0, imagem: "manteiga.jpeg" },
  { nome: "Doce de leite 290g", preco: 18, quantidade: 0, imagem: "logo minimalista par.png" },
  { nome: "Bolacha da vovó 400g", preco: 18, quantidade: 0, imagem: "logo minimalista par.png" },
  { nome: "Palito de chocolate 290g", preco: 18, quantidade: 0, imagem: "palito chocolate.jpeg" },
  { nome: "Bolacha sortida 400g", preco: 20, quantidade: 0, imagem: "sortida.jpeg", destaque: true }
];

function salvarCarrinho(){
localStorage.setItem("carrinho",JSON.stringify(produtos));
}

function carregarCarrinho(){
const dados=localStorage.getItem("carrinho");
if(dados){produtos=JSON.parse(dados);}
}
carregarCarrinho();

const listaProdutos=document.getElementById("listaProdutos");

produtos.forEach((produto,index)=>{
listaProdutos.innerHTML+=`
<div class="produto">
<img src="${produto.imagem}" onclick="abrirImagem('${produto.imagem}')">
<h3>${produto.nome}</h3>
<p class="preco">R$ ${produto.preco.toFixed(2).replace('.',',')}</p>
<div class="controle-produto">
<button onclick="diminuirQuantidade(${index})">-</button>
<span id="qtd-${index}">${produto.quantidade}</span>
<button onclick="aumentarQuantidade(${index})">+</button>
</div>
</div>`;
});

function atualizarContador(){
const total=produtos.reduce((a,p)=>a+p.quantidade,0);
document.getElementById("contadorItens").textContent=total;
produtos.forEach((p,i)=>{
document.getElementById(`qtd-${i}`).textContent=p.quantidade;
});
salvarCarrinho();
}

function abrirCarrinho(){
document.getElementById("modalCarrinho").classList.add("ativo");
atualizarModal();
}

function fecharCarrinho(){
document.getElementById("modalCarrinho").classList.remove("ativo");
}

function aumentarQuantidade(i){
produtos[i].quantidade++;
atualizarContador();
atualizarModal();
}

function diminuirQuantidade(i){
if(produtos[i].quantidade>0){produtos[i].quantidade--;}
atualizarContador();
atualizarModal();
}

function removerItem(i){
if(confirm("Remover item?")){
produtos[i].quantidade=0;
atualizarContador();
atualizarModal();
}
}

function atualizarModal(){
const container=document.getElementById("listaCarrinho");
container.innerHTML="";
const selecionados=produtos.map((p,i)=>({...p,i})).filter(p=>p.quantidade>0);
selecionados.forEach(p=>{
const subtotal=p.quantidade*p.preco;
container.innerHTML+=`
<div class="item-carrinho">
<img src="${p.imagem}">
<div class="item-info">
<strong>${p.quantidade}x ${p.nome}</strong>
<div class="controle-quantidade">
<button onclick="diminuirQuantidade(${p.i})">-</button>
<button onclick="aumentarQuantidade(${p.i})">+</button>
</div>
</div>
<div class="subtotal">
R$ ${subtotal.toFixed(2).replace('.',',')}
</div>
<button class="btn-remover" onclick="removerItem(${p.i})">🗑️</button>
</div>`;
});
const total=produtos.reduce((a,p)=>a+(p.quantidade*p.preco),0);
document.getElementById("totalModal").textContent="Total: R$"+total.toFixed(2).replace('.',',');
}

function enviarPedido(){
const nome=document.getElementById("nomeCliente").value.trim();
if(!nome){alert("Digite seu nome.");return;}
const selecionados=produtos.filter(p=>p.quantidade>0);
if(selecionados.length===0){alert("Carrinho vazio!");return;}
let mensagem="🍪 Pedido Djo Bolachas 🍪\n\nCliente: "+nome+"\n\n";
let total=0;
selecionados.forEach(p=>{
const subtotal=p.quantidade*p.preco;
total+=subtotal;
mensagem+=`${p.quantidade}x ${p.nome} - R$ ${subtotal.toFixed(2).replace('.',',')}\n`;
});
mensagem+="\nTotal: R$ "+total.toFixed(2).replace('.',',');
window.open(`https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`,"_blank");
}

function abrirImagem(src){
document.getElementById("imagemGrande").src=src;
document.getElementById("modalImagem").style.display="flex";
}

function fecharImagem(){
document.getElementById("modalImagem").style.display="none";
}

atualizarContador();
</script>

</body>
</html>
