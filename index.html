<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Djo Bolachas</title>

<style>

/* ====== GERAL ====== */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f8f5f2;
}

header {
  background: #8B4513;
  color: white;
  padding: 15px;
  text-align: center;
}

/* ====== PRODUTOS ====== */
.produtos {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
  gap: 12px;
  padding: 15px;
}

.produto {
  background: white;
  padding: 8px;
  border-radius: 10px;
  text-align: center;
  font-size: 13px;
}

.produto img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
}

.produto button {
  background: #8B4513;
  color: white;
  border: none;
  padding: 5px 8px;
  margin-top: 5px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}

/* ===== CARRINHO FLUTUANTE ===== */
.carrinho-flutuante {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #8B4513;
  color: white;
  border: none;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  font-size: 24px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  z-index: 1000;
  cursor: pointer;
  transition: 0.2s;
}

.carrinho-flutuante:hover {
  transform: scale(1.1);
}

/* ====== MODAL ====== */
.modal {
  display: none;
  position: fixed;
  top: 0;
  right: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  justify-content: flex-end;
}

.modal.ativo {
  display: flex;
}

.modal-conteudo {
  background: white;
  width: 350px;
  height: 100%;
  padding: 20px;
  display: flex;
  flex-direction: column;
  animation: slideIn 0.3s ease forwards;
}

@keyframes slideIn {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}

#listaCarrinho {
  flex: 1;
  margin-top: 15px;
  overflow-y: auto;
}

.item-carrinho {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  border-bottom: 1px solid #eee;
  padding-bottom: 8px;
}

.item-carrinho img {
  width: 50px;
  height: 50px;
  object-fit: cover;
  border-radius: 8px;
}

.item-info {
  flex: 1;
  font-size: 13px;
}

.subtotal {
  font-weight: bold;
  color: #8B4513;
  font-size: 13px;
}

.controle-quantidade {
  display: flex;
  gap: 5px;
  margin-top: 5px;
}

.controle-quantidade button {
  width: 25px;
  height: 25px;
  border: none;
  border-radius: 6px;
  background: #8B4513;
  color: white;
  cursor: pointer;
}

.btn-remover {
  background: red;
  color: white;
  border: none;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}

.btn-finalizar {
  background: green;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  cursor: pointer;
}

</style>
</head>
<body>

<header>
  <h1>Djo Bolachas</h1>
</header>

<div class="produtos" id="listaProdutos"></div>

<!-- BOTÃO FLUTUANTE -->
<button class="carrinho-flutuante" onclick="abrirCarrinho()">
  🛒
</button>

<!-- MODAL -->
<div id="modalCarrinho" class="modal">
  <div class="modal-conteudo">
    <h2>Seu Carrinho</h2>

    <input type="text" id="nomeCliente"
    placeholder="Digite seu nome"
    style="padding:8px; margin:10px 0; border-radius:8px; border:1px solid #ddd;">

    <div id="listaCarrinho"></div>

    <h3 id="totalModal">Total: R$0,00</h3>

    <button class="btn-finalizar" onclick="enviarPedido()">
      Finalizar no WhatsApp
    </button>

    <button onclick="fecharCarrinho()">Fechar</button>
  </div>
</div>

<script>

/* ====== PRODUTOS ====== */
const produtos = [
   { nome: "Especial Páscoa", preco: 25, quantidade: 0, imagem: "pascoa.jpeg", destaque: true },
  { nome: "Pão", preco: 15, quantidade: 0, imagem: "imagens/pao.jpg" },
  { nome: "Polvilho 200g", preco: 13, quantidade: 0, imagem: "imagens/polvilho.jpg" },
  { nome: "Laranja 250g", preco: 13, quantidade: 0, imagem: "imagens/laranja.jpg" },
  { nome: "Cookies 250g", preco: 13, quantidade: 0, imagem: "cookies.jpeg", destaque: true },
  { nome: "Amendoim 250g", preco: 13, quantidade: 0, imagem: "amendoim.jpeg" },
  { nome: "Milho 200g", preco: 13, quantidade: 0, imagem: "imagens/milho200.jpg" },
  { nome: "Milho 400g", preco: 20, quantidade: 0, imagem: "imagens/milho400.jpg" },
  { nome: "Coco 400g", preco: 18, quantidade: 0, imagem: "imagens/coco.jpg" },
  { nome: "Natal 250g", preco: 18, quantidade: 0, imagem: "imagens/natal.jpg" },
  { nome: "Cristal 400g", preco: 18, quantidade: 0, imagem: "imagens/cristal.jpg" },
  { nome: "Goiaba 290g", preco: 18, quantidade: 0, imagem: "imagens/goiaba.jpg" },
  { nome: "Manteiga 400g", preco: 18, quantidade: 0, imagem: "manteiga.jpeg" },
  { nome: "Doce de leite 290g", preco: 18, quantidade: 0, imagem: "imagens/docedeleite.jpg" },
  { nome: "Bolacha da vovó 400g", preco: 18, quantidade: 0, imagem: "imagens/vovo.jpg" },
  { nome: "Palito de chocolate 290g", preco: 18, quantidade: 0, imagem: "palito chocolate.jpeg" },
  { nome: "Bolacha sortida 400g", preco: 20, quantidade: 0, imagem: "sortida.jpeg", destaque: true }
];

const listaProdutos = document.getElementById("listaProdutos");

produtos.forEach((produto, index) => {
  listaProdutos.innerHTML += `
    <div class="produto">
      <img src="${produto.imagem}">
      <h3>${produto.nome}</h3>
      <p>R$ ${produto.preco.toFixed(2).replace('.', ',')}</p>
      <button onclick="aumentarQuantidade(${index})">Adicionar</button>
    </div>
  `;
});

/* ====== FUNÇÕES CARRINHO ====== */

function abrirCarrinho() {
  document.getElementById("modalCarrinho").classList.add("ativo");
  atualizarModal();
}

function fecharCarrinho() {
  const nome = document.getElementById("nomeCliente").value.trim();
  if (!nome) {
    alert("Digite seu nome antes de fechar.");
    return;
  }
  document.getElementById("modalCarrinho").classList.remove("ativo");
}

function aumentarQuantidade(index) {
  produtos[index].quantidade++;
  atualizarModal();
}

function diminuirQuantidade(index) {
  if (produtos[index].quantidade > 0) {
    produtos[index].quantidade--;
  }
  atualizarModal();
}

function removerItem(index) {
  produtos[index].quantidade = 0;
  atualizarModal();
}

function atualizarModal() {
  const container = document.getElementById("listaCarrinho");
  container.innerHTML = "";

  const selecionados = produtos
    .map((p, index) => ({...p, index}))
    .filter(p => p.quantidade > 0);

  if (selecionados.length === 0) {
    container.innerHTML = "Seu carrinho está vazio.";
  } else {
    selecionados.forEach(p => {

      const subtotal = p.quantidade * p.preco;

      container.innerHTML += `
        <div class="item-carrinho">
          <img src="${p.imagem}">
          <div class="item-info">
            <strong>${p.quantidade}x ${p.nome}</strong>
            R$ ${p.preco.toFixed(2).replace('.', ',')} cada

            <div class="controle-quantidade">
              <button onclick="diminuirQuantidade(${p.index})">-</button>
              <button onclick="aumentarQuantidade(${p.index})">+</button>
              <button class="btn-remover" onclick="removerItem(${p.index})">
                Remover
              </button>
            </div>
          </div>
          <div class="subtotal">
            R$ ${subtotal.toFixed(2).replace('.', ',')}
          </div>
        </div>
      `;
    });
  }

  const total = produtos.reduce((acc,p)=>acc + (p.quantidade*p.preco),0);

  document.getElementById("totalModal").textContent =
    "Total: R$" + total.toFixed(2).replace('.', ',');
}

function enviarPedido() {

  const nome = document.getElementById("nomeCliente").value.trim();

  if (!nome) {
    alert("Digite seu nome antes de finalizar.");
    return;
  }

  const selecionados = produtos.filter(p => p.quantidade > 0);

  if (selecionados.length === 0) {
    alert("Carrinho vazio!");
    return;
  }

  const itens = selecionados
    .map(p => `${p.quantidade}x ${p.nome}`)
    .join("%0A");

  const total = produtos.reduce((acc,p)=>acc + (p.quantidade*p.preco),0);

  const mensagem =
    `Pedido Djo Bolachas:%0A%0ACliente: ${nome}%0A%0A${itens}%0A%0ATotal: R$${total.toFixed(2).replace('.', ',')}`;

  const telefone = "5548992236978";

  window.open(`https://wa.me/${telefone}?text=${mensagem}`, "_blank");
}

</script>
</body>
</html>
