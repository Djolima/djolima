<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Djo Bolachas</title>

<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  margin: 0;
  background: linear-gradient(to bottom, #fffaf5, #f5e6d8);
}

/* TOPO */
.topo {
  text-align: center;
  padding: 20px 10px;
}

.logo {
  width: 140px;
}

h1 {
  margin: 10px 0 0;
  color: #8B4513;
}

/* GRID */
#produtos {
  padding: 15px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 15px;
}

/* CARD */
.produto {
  background: white;
  border-radius: 15px;
  padding: 12px;
  position: relative;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
}

.produto img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
}

.selo {
  position: absolute;
  top: 8px;
  left: 8px;
  background: #ff9800;
  color: white;
  padding: 4px 8px;
  font-size: 11px;
  border-radius: 8px;
  font-weight: bold;
}

.nome-produto {
  font-weight: 600;
  margin-top: 8px;
  font-size: 14px;
}

.preco-produto {
  font-weight: bold;
  color: #8B4513;
  margin: 5px 0 10px;
}

.quantidade {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.quantidade button {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: #8B4513;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.quantidade span {
  font-weight: bold;
}

/* CARRINHO FIXO */
.carrinho-fixo {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #8B4513;
  color: white;
  padding: 12px 18px;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}

.carrinho-fixo.animar {
  transform: scale(1.1);
  transition: transform 0.2s;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  right: -100%;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  transition: right 0.3s ease;
  z-index: 999;
  display: flex;
  justify-content: flex-end;
}

.modal.ativo {
  right: 0;
}

.modal-conteudo {
  background: white;
  width: 90%;
  max-width: 380px;
  height: 100%;
  padding: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: -5px 0 15px rgba(0,0,0,0.2);
}

.fechar {
  font-size: 24px;
  cursor: pointer;
  align-self: flex-end;
}

#listaCarrinho {
  flex: 1;
  margin-top: 15px;
  white-space: pre-line;
  font-size: 14px;
}

#totalModal {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
  color: #8B4513;
}

.btn-finalizar {
  margin-top: 15px;
  background: #228B22;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topo">
  <img src="imagens/logo.png" class="logo">
  <h1>Djo Bolachas</h1>
</div>

<div id="produtos"></div>

<div class="carrinho-fixo" id="carrinho" onclick="abrirCarrinho()">
🛒 0 itens
</div>

<div id="modalCarrinho" class="modal">
  <div class="modal-conteudo">
    <span class="fechar" onclick="fecharCarrinho()">×</span>
    <h2>Seu Carrinho</h2>
    <div id="listaCarrinho"></div>
    <h3 id="totalModal">Total: R$0,00</h3>
    <button class="btn-finalizar" onclick="enviarPedido()">
      Finalizar pedido no WhatsApp
    </button>
  </div>
</div>

<script>
const produtos = [
 { nome: "Especial Páscoa", preco: 25, quantidade: 0, imagem: "pascoa.jpeg", destaque: true },
  { nome: "Pão", preco: 15, quantidade: 0, imagem: "imagens/pao.jpg" },
  { nome: "Polvilho 200g", preco: 13, quantidade: 0, imagem: "imagens/polvilho.jpg" },
  { nome: "Laranja 250g", preco: 13, quantidade: 0, imagem: "imagens/laranja.jpg" },
  { nome: "Cookies 250g", preco: 13, quantidade: 0, imagem: "cookies.jpeg", destaque: true },
  { nome: "Amendoim 250g", preco: 13, quantidade: 0, imagem: "amendoim.jpeg" },
  { nome: "Milho 200g", preco: 13, quantidade: 0, imagem: "imagens/milho200.jpg" },
  { nome: "Milho 400g", preco: 20, quantidade: 0, imagem: "imagens/milho400.jpg" },
  { nome: "Coco 400g", preco: 18, quantidade: 0, imagem: "imagens/coco.jpg" },
  { nome: "Natal 250g", preco: 18, quantidade: 0, imagem: "imagens/natal.jpg" },
  { nome: "Cristal 400g", preco: 18, quantidade: 0, imagem: "imagens/cristal.jpg" },
  { nome: "Goiaba 290g", preco: 18, quantidade: 0, imagem: "imagens/goiaba.jpg" },
  { nome: "Manteiga 400g", preco: 18, quantidade: 0, imagem: "manteiga.jpeg" },
  { nome: "Doce de leite 290g", preco: 18, quantidade: 0, imagem: "imagens/docedeleite.jpg" },
  { nome: "Bolacha da vovó 400g", preco: 18, quantidade: 0, imagem: "imagens/vovo.jpg" },
  { nome: "Palito de chocolate 290g", preco: 18, quantidade: 0, imagem: "palito chocolate.jpeg" },
  { nome: "Bolacha sortida 400g", preco: 20, quantidade: 0, imagem: "sortida.jpeg", destaque: true }
];

const container = document.getElementById("produtos");

produtos.forEach((p, i) => {
  const div = document.createElement("div");
  div.className = "produto";

  div.innerHTML = `
    ${p.destaque ? '<div class="selo">⭐ Mais vendido</div>' : ''}
    <img src="${p.imagem}" alt="${p.nome}">
    <div class="nome-produto">${p.nome}</div>
    <div class="preco-produto">R$ ${p.preco.toFixed(2).replace('.', ',')}</div>
    <div class="quantidade">
      <button onclick="alterarQuantidade(${i}, -1)">-</button>
      <span id="qtd-${i}">0</span>
      <button onclick="alterarQuantidade(${i}, 1)">+</button>
    </div>
  `;

  container.appendChild(div);
});

function alterarQuantidade(index, delta) {
  const produto = produtos[index];
  produto.quantidade = Math.max(0, produto.quantidade + delta);
  document.getElementById(`qtd-${index}`).textContent = produto.quantidade;
  atualizarCarrinho();

  const carrinho = document.getElementById("carrinho");
  carrinho.classList.add("animar");
  setTimeout(() => carrinho.classList.remove("animar"), 200);
}

function atualizarCarrinho() {
  const totalItens = produtos.reduce((acc, p) => acc + p.quantidade, 0);
  document.getElementById("carrinho").textContent = `🛒 ${totalItens} item(s)`;
}

function abrirCarrinho() {
  atualizarModal();
  document.getElementById("modalCarrinho").classList.add("ativo");
}

function fecharCarrinho() {
  document.getElementById("modalCarrinho").classList.remove("ativo");
}

function atualizarModal() {
  const lista = produtos
    .filter(p => p.quantidade > 0)
    .map(p => `${p.nome} x${p.quantidade}`)
    .join("\n");

  document.getElementById("listaCarrinho").textContent =
    lista || "Seu carrinho está vazio.";

  const total = produtos.reduce((acc, p) => acc + (p.quantidade * p.preco), 0);

  document.getElementById("totalModal").textContent =
    "Total: R$" + total.toFixed(2).replace('.', ',');
}

function enviarPedido() {
  const itens = produtos
    .filter(p => p.quantidade > 0)
    .map(p => `${p.nome} x${p.quantidade}`)
    .join("%0A");

  if (!itens) {
    alert("Carrinho vazio!");
    return;
  }

  const total = produtos.reduce((acc, p) => acc + (p.quantidade * p.preco), 0);

  const mensagem = `Pedido para Djo Bolachas:%0A%0A${itens}%0A%0ATotal: R$${total.toFixed(2).replace('.', ',')}`;
  const telefone = "5548992236978";

  window.open(`https://wa.me/${telefone}?text=${mensagem}`, "_blank");
}
</script>

</body>
</html>
