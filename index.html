<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Djo Bolachas</title>
  
<style>
body{font-family:Arial, sans-serif;margin:0;background:#f8f5f2;}

header{background:#8B4513;color:white;padding:15px;text-align:center;}

.produtos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:14px;padding:15px;
}

.produto{
background:white;padding:12px;border-radius:12px;
text-align:center;font-size:14px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.produto img{
width:100%;aspect-ratio:1/1;
object-fit:cover;border-radius:10px;cursor:pointer;
}

.preco{color:#8B4513;font-weight:bold;margin-top:5px;}

.controle-produto{
display:flex;justify-content:center;gap:8px;margin-top:6px;
}

.controle-produto button{
width:28px;height:28px;border:none;border-radius:6px;
background:#8B4513;color:white;cursor:pointer;
}

.carrinho-flutuante{
position:fixed;bottom:20px;right:20px;
background:#8B4513;color:white;
width:65px;height:65px;border-radius:50%;
font-size:28px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
border:none;
z-index: 100;
}

.badge{
position:absolute;top:-5px;right:-5px;
background:red;color:white;font-size:13px;
width:22px;height:22px;border-radius:50%;
display:flex;justify-content:center;align-items:center;
}

.modal{
display:none;position:fixed;top:0;right:0;
width:100%;height:100%;
background:rgba(0,0,0,0.4);
justify-content:flex-end;
z-index: 200;
}

.modal.ativo{display:flex;}

.modal-conteudo{
background:white;width:340px;height:80%;
margin:auto 0;border-radius:18px 0 0 18px;
padding:20px;display:flex;flex-direction:column;
}

.item-carrinho{
display:flex;align-items:center;gap:10px;
border-bottom:1px solid #eee;padding:8px 0;
}

.item-carrinho img{
width:50px;height:50px;border-radius:8px;
object-fit:cover;
}

.item-info{flex:1;}

.controle-quantidade{display:flex;gap:5px;margin-top:4px;}

.controle-quantidade button{
width:26px;height:26px;background:#8B4513;
color:white;border:none;border-radius:6px;
}

.btn-remover{
margin-left:auto;font-size:18px;
background:none;border:none;cursor:pointer;
color: #333;
}

.btn-finalizar{
background:green;color:white;border:none;
padding:12px;border-radius:10px;margin-top:10px;
cursor:pointer;
font-weight:bold;
}

.btn-finalizar:disabled{
background:#ccc;
cursor:not-allowed;
}

.btn-voltar{
background:none;border:none;
color:#8B4513;font-weight:bold;margin-top:10px;
cursor:pointer;
}

.modal-imagem{
display:none;position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;align-items:center;
z-index: 300;
}

.modal-imagem img{
max-width:90%;max-height:90%;
}
</style>
</head>

<body>

<header><h1>Djo Bolachas</h1></header>

<div class="produtos" id="listaProdutos"></div>

<button class="carrinho-flutuante" onclick="abrirCarrinho()">
  🛒
  <div class="badge" id="contadorItens">0</div>
</button>

<div id="modalCarrinho" class="modal">
<div class="modal-conteudo">

<h2>Seu Carrinho</h2>

<input type="text" id="nomeCliente" placeholder="Digite seu nome" style="padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; width: calc(100% - 22px);">

<div id="listaCarrinho" style="flex: 1; overflow-y: auto;"></div>

<h3 id="totalModal">Total: R$0,00</h3>

<button class="btn-finalizar" id="btnFinalizar" onclick="enviarPedido()">
Finalizar no WhatsApp
</button>

<button class="btn-voltar" onclick="fecharCarrinho()">
Voltar
</button>

</div>
</div>

<div id="modalImagem" class="modal-imagem" onclick="fecharImagem()">
<img id="imagemGrande">
</div>

<script>

const telefone="5548992236978";

let produtos=[
{ nome:"Especial Mães",preco:25,quantidade:0,imagem:"file_00000000ed80720eba5fcf33a37c2978.png" },
{ nome:"Mães Decorado",preco:12,quantidade:0,imagem:"Maesdecorada.png" },
{ nome:"Pão",preco:15,quantidade:0,imagem:"pao.jpeg" },
{ nome:"Polvilho 200g",preco:13,quantidade:0,imagem:"polvilho.png" },
{ nome:"Laranja 250g",preco:13,quantidade:0,imagem:"laranja.png" },
{ nome:"Cookies 250g",preco:13,quantidade:0,imagem:"cookies.jpeg",destaque:true },
{ nome:"Amendoim 250g",preco:13,quantidade:0,imagem:"amendoim.jpeg" },
{ nome:"Milho 200g",preco:13,quantidade:0,imagem:"IMG-20260306-WA0016.jpg" },
{ nome:"Milho 400g",preco:20,quantidade:0,imagem:"milho.png" },
{ nome:"Coco 400g",preco:18,quantidade:0,imagem:"Coco.jpg" },
{ nome:"Natal 250g",preco:18,quantidade:0,imagem:"natal.png" },
{ nome:"Cristal 400g",preco:18,quantidade:0,imagem:"cristal.jpeg" },
{ nome:"Goiaba 290g",preco:18,quantidade:0,imagem:"goiaba.png" },
{ nome:"Manteiga 400g",preco:18,quantidade:0,imagem:"manteiga.jpeg" },
{ nome:"Doce de leite 290g",preco:18,quantidade:0,imagem:"doce de leite.png" },
{ nome:"Bolacha da vovó 400g",preco:18,quantidade:0,imagem:"IMG-20260306-WA0015.jpg" },
{ nome:"Palito de chocolate 290g",preco:18,quantidade:0,imagem:"palito chocolate.jpeg" },
{ nome:"Bolacha sortida 400g",preco:23,quantidade:0,imagem:"sortida.jpeg",destaque:true }
];

function salvarCarrinho(){
  const carrinhoResumo = produtos.map(p => ({ nome: p.nome, quantidade: p.quantidade }));
  localStorage.setItem("carrinho", JSON.stringify(carrinhoResumo));
}

function carregarCarrinho(){
  const dados = localStorage.getItem("carrinho");
  if(dados){
    const carrinhoSalvo = JSON.parse(dados);
    carrinhoSalvo.forEach(itemSalvo => {
      const produtoAtual = produtos.find(p => p.nome === itemSalvo.nome);
      if(produtoAtual){
        produtoAtual.quantidade = itemSalvo.quantidade;
      }
    });
  }
}
carregarCarrinho();

const nomeSalvo=localStorage.getItem("nomeCliente");
if(nomeSalvo){
document.getElementById("nomeCliente").value=nomeSalvo;
}

document.getElementById("nomeCliente").addEventListener("input",function(){
localStorage.setItem("nomeCliente",this.value);
});

const listaProdutos=document.getElementById("listaProdutos");

produtos.forEach((p,i)=>{
listaProdutos.innerHTML+=`
<div class="produto">
<img src="${p.imagem}" onclick="abrirImagem('${p.imagem}')">
<h3>${p.nome}</h3>
<p class="preco">R$ ${p.preco.toFixed(2).replace('.',',')}</p>
<div class="controle-produto">
<button onclick="diminuirQuantidade(${i})">-</button>
<span id="qtd-${i}">${p.quantidade}</span>
<button onclick="aumentarQuantidade(${i})">+</button>
</div>
</div>`;
});

function atualizarContador(){
const total=produtos.reduce((a,p)=>a+p.quantidade,0);
document.getElementById("contadorItens").textContent=total;

produtos.forEach((p,i)=>{
document.getElementById(`qtd-${i}`).textContent=p.quantidade;
});

salvarCarrinho();
}

function abrirCarrinho(){
document.getElementById("modalCarrinho").classList.add("ativo");
atualizarModal();
}

function fecharCarrinho(){
document.getElementById("modalCarrinho").classList.remove("ativo");
}

function aumentarQuantidade(i){
produtos[i].quantidade++;
atualizarContador();
atualizarModal();
}

function diminuirQuantidade(i){
if(produtos[i].quantidade>0)produtos[i].quantidade--;
atualizarContador();
atualizarModal();
}

function removerItem(i){
if(confirm("Remover item?")){
produtos[i].quantidade=0;
atualizarContador();
atualizarModal();
}
}

function atualizarModal(){
const container=document.getElementById("listaCarrinho");
container.innerHTML="";

const selecionados=produtos.map((p,i)=>({...p,i})).filter(p=>p.quantidade>0);

selecionados.forEach(p=>{
const subtotal=p.quantidade*p.preco;

container.innerHTML+=`
<div class="item-carrinho">
<img src="${p.imagem}">
<div class="item-info">
<strong>${p.quantidade}x ${p.nome}</strong>
<div class="controle-quantidade">
<button onclick="diminuirQuantidade(${p.i})">-</button>
<button onclick="aumentarQuantidade(${p.i})">+</button>
</div>
</div>
<div>R$ ${subtotal.toFixed(2).replace('.',',')}</div>
<button class="btn-remover" onclick="removerItem(${p.i})">✖</button>
</div>`;
});

const total=produtos.reduce((a,p)=>a+(p.quantidade*p.preco),0);
document.getElementById("totalModal").textContent="Total: R$"+total.toFixed(2).replace('.',',');
}
  
function enviarPedido(){
  const nome=document.getElementById("nomeCliente").value.trim();
  if(!nome){alert("Digite seu nome para enviar o pedido.");return;}

  const selecionados=produtos.filter(p=>p.quantidade>0);
  if(selecionados.length===0){alert("Seu carrinho está vazio!");return;}

  // URL DA SUA PLANILHA (COLE AQUI A URL DO SEU SCRIPT DO GOOGLE)
  const URL_DA_PLANILHA = "https://script.google.com/macros/s/AKfycbylx1F23hILQOq_sNkkATzEjs7_VFG86GwxK11ekffJb7s4QN6yCvt_SO1OF94vbh18/exec";

  let msgWhatsApp = "*Pedido Djo Bolachas* \n\n*Cliente:* "+nome+"\n\n";
  let itensParaPlanilha = [];
  let totalGeral = 0;

  selecionados.forEach(p=>{
    const subtotal = p.quantidade * p.preco;
    totalGeral += subtotal;
    
    // Texto para o WhatsApp
    msgWhatsApp += `${p.quantidade}x ${p.nome} - R$ ${subtotal.toFixed(2).replace('.',',')}\n`;
    
    // Objeto para a Planilha (Separado por item)
    itensParaPlanilha.push({
      nome: p.nome,
      qtd: p.quantidade,
      precoUnit: "R$ " + p.preco.toFixed(2).replace('.',','),
      subtotal: "R$ " + subtotal.toFixed(2).replace('.',',')
    });
  });

  const totalFormatado = "R$ " + totalGeral.toFixed(2).replace('.',',');
  msgWhatsApp += "\n*Total: " + totalFormatado + "*";

  const btn = document.getElementById('btnFinalizar');
  const textoOriginal = btn.innerHTML;
  btn.innerHTML = "Salvando Pedido...";
  btn.disabled = true;

  // Enviar para Planilha (Manda a lista de itens agora)
  fetch(URL_DA_PLANILHA, {
    method: "POST",
    body: JSON.stringify({
      nome: nome,
      itens: itensParaPlanilha,
      total: totalFormatado
    })
  })
  .then(() => {
    window.open(`https://wa.me/${telefone}?text=${encodeURIComponent(msgWhatsApp)}`, "_blank");
    finalizarLimpeza(btn, textoOriginal);
  })
  .catch(erro => {
    console.error("Erro planilha:", erro);
    window.open(`https://wa.me/${telefone}?text=${encodeURIComponent(msgWhatsApp)}`, "_blank");
    finalizarLimpeza(btn, textoOriginal);
  });
}

function finalizarLimpeza(btn, textoOriginal){
  produtos.forEach(p=>p.quantidade=0);
  atualizarContador();
  atualizarModal();
  localStorage.removeItem("carrinho");
  fecharCarrinho();
  btn.innerHTML = textoOriginal;
  btn.disabled = false;
}

function abrirImagem(src){
document.getElementById("imagemGrande").src=src;
document.getElementById("modalImagem").style.display="flex";
}

function fecharImagem(){
document.getElementById("modalImagem").style.display="none";
}

atualizarContador();

</script>

</body>
</html>
