<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Djo Bolachas</title>

<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(to bottom, #fffaf5, #f5e6d8);
  padding: 15px;
  margin: 0;
  color: #333;
}

/* TOPO */
.topo {
  text-align: center;
  margin-bottom: 20px;
}

.logo {
  width: 140px;
  margin-bottom: 10px;
}

h1 {
  font-size: 26px;
  color: #8B4513;
  margin: 0;
}

h2 {
  text-align: center;
  color: #A0522D;
  margin-bottom: 20px;
}

/* GRID */
#produtos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 15px;
}

/* CARD */
.produto {
  background: white;
  border-radius: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  padding: 12px;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.produto:hover {
  transform: translateY(-3px);
}

.info-produto {
  text-align: center;
}

.info-produto img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
}

/* SELO */
.selo {
  position: absolute;
  top: 8px;
  left: 8px;
  background: #ff9800;
  color: white;
  padding: 4px 8px;
  font-size: 11px;
  border-radius: 8px;
  font-weight: bold;
}

.nome-produto {
  font-size: 14px;
  font-weight: 600;
  margin-top: 8px;
}

.preco-produto {
  font-size: 15px;
  font-weight: bold;
  color: #8B4513;
  margin: 5px 0 10px 0;
}

.quantidade {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.quantidade button {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: #8B4513;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.quantidade span {
  font-size: 14px;
  font-weight: bold;
}

/* FORM */
.formulario {
  margin-top: 40px;
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
}

#total {
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  color: #8B4513;
}

button.enviar {
  width: 100%;
  background: #228B22;
  color: white;
  border: none;
  padding: 12px;
  font-size: 15px;
  border-radius: 10px;
  cursor: pointer;
}

/* CARRINHO FIXO */
.carrinho-fixo {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #8B4513;
  color: white;
  padding: 12px 18px;
  border-radius: 50px;
  font-weight: bold;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="topo">
  <img src="imagens/logo.png" class="logo" alt="Logo Djo Bolachas">
  <h1>Djo Bolachas</h1>
</div>

<h2>Escolha seus sabores favoritos:</h2>

<div id="produtos"></div>

<div class="formulario">
  <h2>Finalize seu pedido</h2>
  <input type="text" id="nome" placeholder="Seu nome" required>
  <textarea id="pedido" placeholder="Produtos selecionados..." readonly></textarea>
  <h3 id="total">Total: R$0,00</h3>
  <button class="enviar" onclick="enviarPedido()">Enviar pedido pelo WhatsApp</button>
</div>

<div class="carrinho-fixo" id="carrinho">
🛒 0 itens
</div>

<script>

const produtos = [
  { nome: "Especial Páscoa", preco: 25, quantidade: 0, imagem: "pascoa.jpeg", destaque: true },
  { nome: "Pão", preco: 15, quantidade: 0, imagem: "imagens/pao.jpg" },
  { nome: "Polvilho 200g", preco: 13, quantidade: 0, imagem: "imagens/polvilho.jpg" },
  { nome: "Laranja 250g", preco: 13, quantidade: 0, imagem: "imagens/laranja.jpg" },
  { nome: "Cookies 250g", preco: 13, quantidade: 0, imagem: "imagens/cookies.jpg", destaque: true },
  { nome: "Amendoim 250g", preco: 13, quantidade: 0, imagem: "imagens/amendoim.jpg" },
  { nome: "Milho 200g", preco: 13, quantidade: 0, imagem: "imagens/milho200.jpg" },
  { nome: "Milho 400g", preco: 20, quantidade: 0, imagem: "imagens/milho400.jpg" },
  { nome: "Coco 400g", preco: 18, quantidade: 0, imagem: "imagens/coco.jpg" },
  { nome: "Natal 250g", preco: 18, quantidade: 0, imagem: "imagens/natal.jpg" },
  { nome: "Cristal 400g", preco: 18, quantidade: 0, imagem: "imagens/cristal.jpg" },
  { nome: "Goiaba 290g", preco: 18, quantidade: 0, imagem: "imagens/goiaba.jpg" },
  { nome: "Manteiga 400g", preco: 18, quantidade: 0, imagem: "imagens/manteiga.jpg" },
  { nome: "Doce de leite 290g", preco: 18, quantidade: 0, imagem: "imagens/docedeleite.jpg" },
  { nome: "Bolacha da vovó 400g", preco: 18, quantidade: 0, imagem: "imagens/vovo.jpg" },
  { nome: "Palito de chocolate 290g", preco: 18, quantidade: 0, imagem: "imagens/palito.jpg" },
  { nome: "Bolacha sortida 400g", preco: 20, quantidade: 0, imagem: "sortida.jpeg", destaque: true }
];

const container = document.getElementById("produtos");

produtos.forEach((p, i) => {
  const div = document.createElement("div");
  div.className = "produto";

  div.innerHTML = `
    ${p.destaque ? '<div class="selo">⭐ Mais vendido</div>' : ''}
    <div class="info-produto">
      <img src="${p.imagem}" alt="${p.nome}">
      <div class="nome-produto">${p.nome}</div>
      <div class="preco-produto">R$ ${p.preco.toFixed(2)}</div>
    </div>
    <div class="quantidade">
      <button onclick="alterarQuantidade(${i}, -1)">-</button>
      <span id="qtd-${i}">0</span>
      <button onclick="alterarQuantidade(${i}, 1)">+</button>
    </div>
  `;

  container.appendChild(div);
});

function alterarQuantidade(index, delta) {
  const produto = produtos[index];
  produto.quantidade = Math.max(0, produto.quantidade + delta);
  document.getElementById(`qtd-${index}`).textContent = produto.quantidade;
  atualizarPedido();
}

function atualizarPedido() {
  const textarea = document.getElementById("pedido");

  const resumo = produtos
    .filter(p => p.quantidade > 0)
    .map(p => `- ${p.nome} x${p.quantidade}`)
    .join("\n");

  textarea.value = resumo;

  const total = produtos.reduce((acc, p) => acc + (p.quantidade * p.preco), 0);
  const totalItens = produtos.reduce((acc, p) => acc + p.quantidade, 0);

  document.getElementById("total").textContent =
    "Total: R$" + total.toFixed(2).replace('.', ',');

  document.getElementById("carrinho").textContent =
    `🛒 ${totalItens} item(s)`;
}

function enviarPedido() {
  const nome = document.getElementById("nome").value.trim();
  const texto = document.getElementById("pedido").value.trim();
  const total = produtos.reduce((acc, p) => acc + (p.quantidade * p.preco), 0);

  if (!nome || !texto) {
    alert("Preencha seu nome e selecione ao menos um produto.");
    return;
  }

  const msg = encodeURIComponent(
    `Pedido para Djo Bolachas:\n\nNome: ${nome}\n\nProdutos:\n${texto}\n\nTotal: R$${total.toFixed(2).replace('.', ',')}`
  );

  const numero = "5548992236978";
  window.open(`https://wa.me/${numero}?text=${msg}`, '_blank');
}

</script>

</body>
</html>
